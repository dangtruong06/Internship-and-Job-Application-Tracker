<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <title>{% block title %}Appli{% endblock %}</title>
</head>
<body style="background: #0f172a; margin: 0;">

<div class="d-flex" style="min-height: 100vh;">

    <!-- Sidebar -->
    <div class="d-flex flex-column align-items-center py-4 gap-5"
         style="width: 120px; background: #0d1424; border-right: 1px solid #1e293b; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;">

        <!-- Logo -->
        <a href="/" class="mb-3 text-decoration-none d-flex align-items-center justify-content-center"
           style="width: 36px; height: 36px; background: #60a5fa; border-radius: 8px; font-weight: 600; font-size: 14px; color: #0f172a;">
            {{ current_user.name[0] }}
        </a>

        <!-- Top nav icons -->
        <a href="{{ url_for('dashboard') }}" title="Dashboard"
           class="sidebar-icon {% block nav_dashboard %}{% endblock %}">
            <i class="bi bi-grid"></i>
        </a>
        <a href="{{ url_for('add') }}" title="Add Job"
           class="sidebar-icon {% block nav_add %}{% endblock %}">
            <i class="bi bi-plus-circle"></i>
        </a>

        <!-- Bottom nav icons -->
        <div class="mt-auto d-flex flex-column align-items-center gap-3">
            <a href="{{ url_for('logout')}}" title="Log out" class="sidebar-icon">
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>
    </div>

    <div style="margin-left: 120px; flex: 1; padding: 28px 28px;">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
